<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photographer QR Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root { --primary: #4F46E5; --primary-hover: #4338CA; --danger: #EF4444; --success: #10B981; --bg: #F3F4F6; --card: #FFFFFF; }
      body { font-family: 'Prompt', sans-serif; background-color: var(--bg); color: #1F2937; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; padding-bottom: 100px; }
      #app { width: 100%; max-width: 1000px; }
      h1 { text-align: center; margin-bottom: 30px; font-weight: 600; }
      
      .header-control { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; }
      input { padding: 12px 20px; width: 300px; border: 1px solid #D1D5DB; border-radius: 12px; font-size: 16px; font-family: 'Prompt', sans-serif; outline: none; transition: 0.2s; }
      input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
      .btn-create { padding: 12px 24px; background-color: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-family: 'Prompt', sans-serif; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
      .btn-create:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
      #folder-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
      
      @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
      .folder-card { background: var(--card); border-radius: 16px; padding: 25px; text-align: center; position: relative; transition: box-shadow 0.3s, transform 0.3s; border: 1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      .folder-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
      .folder-icon { font-size: 60px; margin-bottom: 10px; line-height: 1; }
      .folder-name { font-size: 18px; font-weight: 500; margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .folder-date { color: #6B7280; font-size: 13px; margin-bottom: 20px; }
      .btn-open { width: 100%; padding: 10px; background-color: #F3F4F6; color: #374151; border: none; border-radius: 8px; cursor: pointer; font-family: 'Prompt', sans-serif; font-weight: 500; transition: 0.2s; }
      .btn-open:hover { background-color: #E5E7EB; }
      .delete-btn { position: absolute; top: 15px; right: 15px; background: #FEE2E2; color: var(--danger); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
      .folder-card:hover .delete-btn { opacity: 1; }
      
      #gallery-view { display: none; width: 100%; animation: popIn 0.4s ease; }
      .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
      .header-left { display: flex; align-items: center; gap: 15px; }
      .btn-back { padding: 10px 20px; background: white; border: 1px solid #D1D5DB; border-radius: 12px; cursor: pointer; font-family: 'Prompt', sans-serif; font-weight: 500; }
      #gallery-title { font-size: 24px; font-weight: 600; margin: 0; }
      .btn-scan { padding: 12px 24px; background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-family: 'Prompt', sans-serif; font-size: 16px; font-weight: 500; }
      
      #photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
      
      .photo-wrapper { position: relative; cursor: pointer; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.2s; background: #ddd; aspect-ratio: 3/4; }
      .photo-wrapper:hover { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
      .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; transition: 0.2s; }
      
      .check-circle { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; background: rgba(255,255,255,0.8); border: 2px solid #D1D5DB; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 10; }
      .check-circle svg { width: 16px; height: 16px; color: white; opacity: 0; transition: 0.2s; }
      
      .photo-wrapper.selected img { opacity: 0.7; transform: scale(0.95); border-radius: 8px; }
      .photo-wrapper.selected .check-circle { background: var(--primary); border-color: var(--primary); }
      .photo-wrapper.selected .check-circle svg { opacity: 1; }

      .loading-text { text-align: center; color: #6B7280; margin-top: 50px; font-size: 18px; width: 100%; grid-column: 1 / -1; }

      #download-bar { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); align-items: center; gap: 20px; z-index: 100; border: 1px solid #E5E7EB; animation: popIn 0.3s ease; }
      #download-bar.show { display: flex; }
      #selected-count { font-weight: 600; color: var(--primary); font-size: 16px; }
      .btn-download-batch { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-family: 'Prompt', sans-serif; font-weight: 500; transition: 0.2s; }
      .btn-download-batch:hover { background: var(--primary-hover); }
      .btn-cancel-select { background: none; border: none; color: #6B7280; cursor: pointer; font-family: 'Prompt', sans-serif; text-decoration: underline; }

      #lightbox { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
      #lightbox.show { display: flex; animation: popIn 0.2s ease; }
      #lightbox-img { max-width: 90%; max-height: 75vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
      .btn-close-lightbox { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
      .btn-close-lightbox:hover { background: rgba(255,255,255,0.4); }
      .btn-download-single { margin-top: 25px; padding: 12px 30px; background: white; color: #1F2937; text-decoration: none; border-radius: 50px; font-family: 'Prompt', sans-serif; font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
      
      #custom-modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); align-items: center; justify-content: center; z-index: 1000; }
      #custom-modal.show { display: flex; }
      .modal-content { background: white; padding: 40px 30px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
      .modal-actions { display: flex; gap: 15px; margin-top:20px; }
      .btn-cancel, .btn-confirm-delete { flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Prompt', sans-serif; font-weight: 500; }
      .btn-cancel { background: #F3F4F6; } .btn-confirm-delete { background: var(--danger); color: white; }

      #camera-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; flex-direction: column; }
      #video-preview { width: 90%; max-width: 400px; border-radius: 24px; border: 4px solid var(--primary); transform: scaleX(-1); aspect-ratio: 3/4; object-fit: cover; }
      .camera-controls { display: flex; gap: 20px; margin-top: 30px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="dashboard-view">
        <h1>📷 จัดการภาพถ่ายงานอีเวนต์ 📸</h1>
        <div class="header-control">
          <input type="text" id="eventName" placeholder="พิมพ์ชื่องานที่นี่..." autocomplete="off" />
          <button id="createBtn" class="btn-create">+ สร้างโฟลเดอร์งาน</button>
        </div>
        <div id="folder-container"></div>
      </div>

      <div id="gallery-view">
        <div class="gallery-header">
          <div class="header-left">
            <button class="btn-back" id="btnBack">🔙 กลับ</button>
            <h2 id="gallery-title">ชื่องาน...</h2>
          </div>
          <button class="btn-scan" id="btnScanFace">📸 ค้นหารูปของฉัน</button>
        </div>
        <div id="photo-grid"></div>
      </div>
    </div>

    <div id="custom-modal">
      <div class="modal-content">
        <div style="font-size: 22px; font-weight: 600; margin-bottom: 15px;">ยืนยันการลบทิ้ง?</div>
        <div id="modal-message" style="color: #6B7280; line-height: 1.6;"></div>
        <div class="modal-actions">
          <button class="btn-cancel" id="cancelDeleteBtn">ยกเลิก</button>
          <button class="btn-confirm-delete" id="confirmDeleteBtn">ใช่, ลบทิ้ง</button>
        </div>
      </div>
    </div>

    <div id="download-bar">
      <div id="selected-count">เลือกแล้ว 0 รูป</div>
      <button class="btn-download-batch" id="btnDownloadBatch">⬇️ โหลดรูปที่เลือก</button>
      <button class="btn-cancel-select" id="btnCancelSelect">ยกเลิก</button>
    </div>

    <div id="lightbox">
      <button class="btn-close-lightbox" id="btnCloseLightbox">&times;</button>
      <img id="lightbox-img" src="" alt="Full photo" />
      <a id="lightbox-download" href="#" target="_blank" class="btn-download-single">
        บันทึกรูปภาพ
      </a>
    </div>

    <div id="camera-modal">
      <video id="video-preview" autoplay muted playsinline></video>
      <div class="camera-controls">
        <button onclick="document.getElementById('camera-modal').style.display='none'" class="btn-cancel" style="background: #444; color: white; padding: 15px 30px; border-radius: 50px;">ยกเลิก</button>
        <button id="btnCapture" style="background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 600; cursor: pointer; font-family: 'Prompt'; font-size: 18px;">📸 ถ่ายรูป</button>
      </div>
      <canvas id="capture-canvas" style="display: none;"></canvas>
    </div>

<script src="https://justadudewhohacks.github.io/face-api.js/face-api.min.js"></script>
    
    <script src="main.js"></script>
  </body>
</html>
